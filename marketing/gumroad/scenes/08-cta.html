<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Scene 08 · CTA</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
<link rel="stylesheet" href="../style.css" />
<style>
  .s8 {
    background: var(--gradient-hero);
    color: #fff;
    flex-direction: column;
    text-align: center;
    padding: 60px;
    gap: 26px;
  }
  .s8__brand {
    display: flex; align-items: center; gap: 14px; justify-content: center;
    animation: fadeInUp .8s cubic-bezier(.2,.8,.2,1) .1s both;
  }
  .s8__h {
    font-size: 80px;
    font-weight: 900;
    letter-spacing: -3px;
    line-height: 1;
    animation: fadeInUp 1s cubic-bezier(.2,.8,.2,1) .4s both;
  }
  .s8__h .gradient {
    background: linear-gradient(135deg, #FFD700 0%, #FF6B6B 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .s8__sub {
    font-size: 22px;
    opacity: 0.85;
    font-weight: 500;
    animation: fadeInUp .9s cubic-bezier(.2,.8,.2,1) .8s both;
    max-width: 720px;
  }
  .s8__cta {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 22px 48px;
    background: var(--gradient-pro);
    color: #5C3A00;
    border-radius: 99px;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -0.4px;
    box-shadow: 0 24px 60px rgba(255, 165, 0, 0.55);
    animation: fadeInUp .9s cubic-bezier(.34,1.56,.64,1) 1.2s both, pulseGlow 2.4s ease-in-out 2.5s infinite;
    margin-top: 8px;
  }
  .s8__cta-arrow {
    font-size: 32px;
    animation: drift 1.6s ease-in-out infinite;
  }
  .s8__url {
    font-family: var(--font-mono);
    font-size: 16px;
    padding: 10px 20px;
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 8px;
    letter-spacing: 0.5px;
    animation: fadeInUp .8s cubic-bezier(.2,.8,.2,1) 1.6s both;
  }
  .s8__guarantees {
    display: flex; gap: 14px; justify-content: center;
    margin-top: 6px;
    animation: fadeInUp .8s cubic-bezier(.2,.8,.2,1) 2s both;
  }
  .s8__guarantees .pill {
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.20);
    color: #fff;
    backdrop-filter: blur(8px);
    font-weight: 700;
    padding: 8px 16px;
  }
</style>
</head>
<body data-stage="video" data-duration="7500">
  <div class="stage s8">
    <div class="bg-glow bg-glow--pink anim-drift" style="top: -200px; left: -150px;"></div>
    <div class="bg-glow bg-glow--blue anim-drift" style="bottom: -200px; right: -150px; animation-delay: -3s;"></div>
    <div class="bg-grid" style="opacity: 0.4;"></div>

    <div class="s8__brand">
      <div class="brand-mark brand-mark--lg" style="background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.25);">WA</div>
      <div style="text-align: left;">
        <div style="font-size: 22px; font-weight: 800; letter-spacing: -0.5px;">Contacts Exporter <span style="color:#FFD700;">PRO</span></div>
        <div style="font-size: 12px; opacity: 0.75; letter-spacing: 1px;">BLUEDEV</div>
      </div>
    </div>

    <div class="s8__h">Get <span class="gradient">Pro.</span></div>
    <div class="s8__sub">Lifetime license. One payment. All updates included.</div>

    <div class="s8__cta">
      Buy on Gumroad
      <span class="s8__cta-arrow">→</span>
    </div>
    <div class="s8__url">gumroad.com/l/wa-contacts-exporter-pro</div>

    <div class="s8__guarantees">
      <div class="pill">✓ 30-day refund</div>
      <div class="pill">✓ Lifetime updates</div>
      <div class="pill">✓ Priority support</div>
    </div>
  </div>
</body>
</html>
